name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          sdkmanager --install "ndk;27.1.12297006" 2>/dev/null || sdkmanager --install "ndk;26.1.10909125" 2>/dev/null || true

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate placeholder assets
        run: |
          mkdir -p assets
          node -e "
          const fs=require('fs');
          const b=Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12NgAAIABQAABjE+ibYAAAAASUVORK5CYII=','base64');
          ['icon.png','adaptive-icon.png','splash-icon.png','favicon.png'].forEach(f=>fs.writeFileSync('assets/'+f,b));
          "

      - name: Expo prebuild
        run: npx expo prebuild --platform android --non-interactive
        env:
          EXPO_NO_TELEMETRY: '1'

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8'

      - name: Copy APK
        run: |
          find android/app/build/outputs/apk/debug -name "*.apk" | head -1 | xargs -I{} cp {} ScanVault.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScanVault-APK
          path: ScanVault.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ScanVault v1.0.${{ github.run_number }}
          body: |
            ## ScanVault Native — APK Android

            App nativa React Native:
            - Cámara nativa expo-camera
            - Detección automática de documentos (Otsu + flood-fill)
            - Corrección de perspectiva (homografía)
            - Modos: Mejorar / Color / B&N / Original
            - Exportar PDF
            - OCR offline (reconocimiento de texto)
            - Almacenamiento local con AsyncStorage

            **Instalar:** descarga `ScanVault.apk` → abre en el móvil → Instalar
          files: ScanVault.apk
          make_latest: true
          fail_on_unmatched_files: false
