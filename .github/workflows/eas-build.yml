name: EAS Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (preview profile)
        run: eas build --platform android --profile preview --non-interactive --output ./ScanVault.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScanVault-APK
          path: ScanVault.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: native-v1.0.${{ github.run_number }}
          name: ScanVault Native v1.0.${{ github.run_number }}
          body: |
            ## ScanVault Native (Expo) — APK Android

            App nativa React Native con:
            - Cámara real expo-camera
            - Detección automática de documentos (Otsu)
            - Corrección de perspectiva (homografía)
            - Modos Mejorar / Color / B&N / Original
            - Almacenamiento local con AsyncStorage

            **Instalar:** descarga `ScanVault.apk` → abre en el móvil → Instalar
          files: ScanVault.apk
          make_latest: true
          fail_on_unmatched_files: false
