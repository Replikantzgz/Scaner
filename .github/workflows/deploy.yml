name: Deploy & Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r index.html manifest.json sw.js icons libs _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Show environment
        run: |
          echo "Node: $(node -v)"
          echo "npm:  $(npm -v)"
          echo "Java: $(java -version 2>&1 | head -1)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          ls -la "$ANDROID_HOME" 2>/dev/null || echo "No SDK directory"

      - name: Accept Android SDK licenses
        run: |
          if [ -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          fi

      - name: Prepare web bundle
        run: |
          mkdir -p pwa-dist
          cp -r index.html manifest.json sw.js icons libs pwa-dist/
          ls -la pwa-dist/

      - name: Write Capacitor config
        run: |
          echo '{"name":"scanvault","version":"1.0.0","private":true}' > package.json
          echo '{"appId":"com.scanvault.app","appName":"ScanVault","webDir":"pwa-dist","android":{"backgroundColor":"#0b0c12"}}' > capacitor.config.json
          cat capacitor.config.json

      - name: Install Capacitor packages
        run: |
          npm install --save-exact \
            @capacitor/core@6.1.2 \
            @capacitor/cli@6.1.2 \
            @capacitor/android@6.1.2
          npx cap --version

      - name: Add Android platform
        run: |
          npx cap add android
          ls -la android/

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Inject app icons
        run: |
          RES=android/app/src/main/res
          ls $RES/

          if command -v convert >/dev/null 2>&1; then
            convert icons/icon-72.png -resize 48x48 $RES/mipmap-mdpi/ic_launcher.png
            convert icons/icon-72.png -resize 48x48 $RES/mipmap-mdpi/ic_launcher_round.png
          else
            cp icons/icon-72.png $RES/mipmap-mdpi/ic_launcher.png
            cp icons/icon-72.png $RES/mipmap-mdpi/ic_launcher_round.png
          fi

          for pair in "72:hdpi" "96:xhdpi" "144:xxhdpi" "192:xxxhdpi"; do
            size=${pair%:*}; d=${pair#*:}
            cp icons/icon-$size.png $RES/mipmap-$d/ic_launcher.png
            cp icons/icon-$size.png $RES/mipmap-$d/ic_launcher_round.png
          done

          rm -f $RES/mipmap-anydpi-v26/ic_launcher.xml
          rm -f $RES/mipmap-anydpi-v26/ic_launcher_round.xml
          echo "Icons injected ✓"

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk ScanVault.apk
          ls -lh ScanVault.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScanVault-APK
          path: ScanVault.apk
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ScanVault v1.0.${{ github.run_number }}
          body: |
            ## ScanVault — APK lista para instalar 📱

            Descarga `ScanVault.apk` y transfiérelo a tu móvil Android.

            **Para instalar:**
            1. Abre el APK desde el gestor de archivos
            2. Si aparece "fuentes desconocidas", actívalo y continúa
            3. Pulsa **Instalar**

            La app funciona **100% offline**, sin publicidad.
          files: ScanVault.apk
          make_latest: true
          fail_on_unmatched_files: false
