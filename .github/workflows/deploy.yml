name: Deploy & Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r index.html manifest.json sw.js icons libs _site/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    concurrency:
      group: apk-build
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            platform-tools

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Show environment
        run: |
          echo "Node: $(node -v)"
          echo "npm:  $(npm -v)"
          echo "Java: $(java -version 2>&1 | head -1)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          which convert && convert -version | head -1 || echo "ImageMagick MISSING"

      # ── Prepare web assets ──────────────────────────────────────────
      - name: Prepare web bundle
        run: |
          mkdir -p pwa-dist
          cp -r index.html manifest.json sw.js icons libs pwa-dist/
          ls -la pwa-dist/

      # ── Setup Capacitor (bypass interactive cap init) ────────────────
      - name: Write Capacitor config
        run: |
          echo '{"name":"scanvault","version":"1.0.0","private":true}' > package.json
          echo '{"appId":"com.scanvault.app","appName":"ScanVault","webDir":"pwa-dist","android":{"backgroundColor":"#0b0c12"}}' > capacitor.config.json
          cat capacitor.config.json

      - name: Install Capacitor packages
        run: |
          npm install --save-exact \
            @capacitor/core@6.1.2 \
            @capacitor/cli@6.1.2 \
            @capacitor/android@6.1.2
          npx cap --version

      - name: Add Android platform
        run: |
          set -x
          npx cap add android
          ls -la android/

      - name: Copy web assets to Android
        run: |
          set -x
          npx cap copy android
          ls -la android/app/src/main/assets/public/ | head

      # ── Inject custom icons ──────────────────────────────────────────
      - name: Inject app icons
        run: |
          set -x
          RES=android/app/src/main/res
          ls -la $RES/

          # mdpi 48x48 — resize from 72 with ImageMagick
          convert icons/icon-72.png  -resize 48x48  $RES/mipmap-mdpi/ic_launcher.png
          convert icons/icon-72.png  -resize 48x48  $RES/mipmap-mdpi/ic_launcher_round.png
          # hdpi 72x72
          cp icons/icon-72.png   $RES/mipmap-hdpi/ic_launcher.png
          cp icons/icon-72.png   $RES/mipmap-hdpi/ic_launcher_round.png
          # xhdpi 96x96
          cp icons/icon-96.png   $RES/mipmap-xhdpi/ic_launcher.png
          cp icons/icon-96.png   $RES/mipmap-xhdpi/ic_launcher_round.png
          # xxhdpi 144x144
          cp icons/icon-144.png  $RES/mipmap-xxhdpi/ic_launcher.png
          cp icons/icon-144.png  $RES/mipmap-xxhdpi/ic_launcher_round.png
          # xxxhdpi 192x192
          cp icons/icon-192.png  $RES/mipmap-xxxhdpi/ic_launcher.png
          cp icons/icon-192.png  $RES/mipmap-xxxhdpi/ic_launcher_round.png

          # Remove any adaptive icon XML so our PNGs are used directly
          rm -f $RES/mipmap-anydpi-v26/ic_launcher.xml
          rm -f $RES/mipmap-anydpi-v26/ic_launcher_round.xml

          echo "Icons injected ✓"

      # ── Build APK ────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -200

      - name: Stage APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk ScanVault.apk
          ls -lh ScanVault.apk

      # ── Upload as artifact (always available) ────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScanVault-APK
          path: ScanVault.apk
          retention-days: 90

      # ── Create GitHub Release with APK ───────────────────────────────
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ScanVault v1.0.${{ github.run_number }}
          body: |
            ## ScanVault — APK lista para instalar 📱

            Descarga `ScanVault.apk` y transfiérelo a tu móvil Android.

            **Para instalar:**
            1. Abre el APK desde el gestor de archivos
            2. Si aparece "fuentes desconocidas", actívalo y continúa
            3. Pulsa **Instalar**

            La app funciona **100% offline**, sin publicidad.
          files: ScanVault.apk
          make_latest: true
          fail_on_unmatched_files: false
